<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RifqyTranslatePro Ultimate</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: system-ui, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .cyber-glow { box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .wave { width: 4px; background: #3b82f6; border-radius: 2px; animation: wave 1s ease-in-out infinite; }
        .wave:nth-child(2) { animation-delay: 0.2s; } .wave:nth-child(3) { animation-delay: 0.4s; }
        @keyframes wave { 0%, 100% { height: 10px; } 50% { height: 30px; } }
    </style>
</head>
<body class="h-dvh w-full flex flex-col overflow-hidden">

    <header class="h-[60px] px-4 bg-slate-950 border-b border-white/10 flex justify-between items-center z-50 shrink-0">
        <h1 class="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 tracking-wide">
            RifqyTranslate<span class="text-white text-[10px] ml-1 border border-white/20 px-1 rounded bg-white/10">PRO</span>
        </h1>
    </header>

    <main class="flex-grow relative overflow-hidden bg-slate-900">
        
        <section id="tab-text" class="w-full h-full p-4 overflow-y-auto no-scrollbar flex flex-col max-w-3xl mx-auto space-y-4">
            <div class="bg-slate-800 p-3 rounded-2xl border border-white/10">
                <div class="flex gap-2 items-center">
                    <div class="w-1/2 flex flex-col gap-1">
                        <input type="text" id="searchTxtSrc" onkeyup="filterLang('searchTxtSrc', 'valTxtSrc')" placeholder="🔍 Cari bahasa..." class="bg-slate-950 text-xs px-2 py-1.5 rounded outline-none border border-slate-700 text-slate-300">
                        <select id="valTxtSrc" class="bg-slate-900 text-xs text-blue-300 p-2 rounded outline-none border border-slate-700"></select>
                    </div>
                    <button onclick="tukarBahasa('valTxtSrc', 'valTxtTgt')" class="text-slate-500 hover:text-white px-1">⇌</button>
                    <div class="w-1/2 flex flex-col gap-1">
                        <input type="text" id="searchTxtTgt" onkeyup="filterLang('searchTxtTgt', 'valTxtTgt')" placeholder="🔍 Cari bahasa..." class="bg-slate-950 text-xs px-2 py-1.5 rounded outline-none border border-slate-700 text-slate-300">
                        <select id="valTxtTgt" class="bg-slate-900 text-xs text-purple-300 p-2 rounded outline-none border border-slate-700"></select>
                    </div>
                </div>
            </div>

            <textarea id="txtInput" class="w-full h-[120px] bg-slate-800/50 border border-white/10 rounded-2xl p-4 resize-none outline-none text-lg" placeholder="Ketik atau paste teks di sini..."></textarea>
            <textarea id="txtOutput" readonly class="w-full flex-grow min-h-[120px] bg-indigo-950/30 border border-indigo-500/30 rounded-2xl p-4 resize-none outline-none text-lg text-indigo-100" placeholder="Hasil Terjemahan..."></textarea>
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="runTranslate()" class="col-span-2 py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold shadow-lg">TERJEMAHKAN</button>
                <button onclick="copyText('txtOutput')" class="bg-slate-800 py-2 rounded-xl text-xs font-bold">Salin Hasil</button>
                <button onclick="speakNatural('txtOutput', 'valTxtTgt')" class="bg-purple-600 py-2 rounded-xl text-xs font-bold">🔊 Dengar</button>
                <button onclick="kirimKeSmartAI('txtOutput')" class="col-span-2 py-2 bg-indigo-900 border border-indigo-500 text-indigo-300 rounded-xl text-xs font-bold">🧠 Bedah dengan Gemini AI</button>
            </div>
        </section>

        <section id="tab-voice" class="hidden w-full h-full p-4 flex flex-col max-w-3xl mx-auto space-y-4 overflow-y-auto no-scrollbar">
            <div class="bg-slate-800 p-3 rounded-2xl border border-white/10">
                <div class="flex gap-2 items-center">
                    <div class="w-1/2 flex flex-col gap-1">
                        <input type="text" id="searchVocSrc" onkeyup="filterLang('searchVocSrc', 'voiceSrc')" placeholder="🔍 Cari dialek..." class="bg-slate-950 text-[10px] px-2 py-1 rounded outline-none border border-slate-700 text-slate-300">
                        <select id="voiceSrc" class="bg-slate-900 text-xs text-blue-300 p-2 rounded outline-none border border-slate-700"></select>
                    </div>
                    <span class="text-slate-500 px-1">➜</span>
                    <div class="w-1/2 flex flex-col gap-1">
                        <input type="text" id="searchVocTgt" onkeyup="filterLang('searchVocTgt', 'voiceTgt')" placeholder="🔍 Terjemah ke..." class="bg-slate-950 text-[10px] px-2 py-1 rounded outline-none border border-slate-700 text-slate-300">
                        <select id="voiceTgt" class="bg-slate-900 text-xs text-purple-300 p-2 rounded outline-none border border-slate-700"></select>
                    </div>
                </div>
            </div>

            <div class="flex-grow flex flex-col gap-4">
                <div class="bg-slate-800/50 p-4 rounded-2xl border-l-4 border-blue-500 min-h-[100px]">
                    <p class="text-[10px] text-blue-500 font-bold mb-1">SUARA DITANGKAP:</p>
                    <p id="voiceTextIn" class="text-lg italic text-slate-300">Klik mic di bawah...</p>
                </div>
                <div class="bg-indigo-900/20 p-4 rounded-2xl border-l-4 border-purple-500 flex-grow">
                    <p class="text-[10px] text-purple-400 font-bold mb-1">TERJEMAHAN:</p>
                    <p id="voiceTextOut" class="text-xl font-bold text-white">...</p>
                </div>
            </div>

            <div class="flex flex-col items-center justify-center pb-6">
                <div id="waveAnim" class="hidden h-10 w-full flex items-center justify-center gap-1 mb-4">
                    <div class="wave"></div><div class="wave"></div><div class="wave"></div>
                </div>
                <button id="btnVoiceMic" onclick="startInstantVoice()" class="w-16 h-16 bg-red-600 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(220,38,38,0.5)] active:scale-90 transition">
                    🎤
                </button>
            </div>
        </section>

        <section id="tab-cyber" class="hidden w-full h-full p-4 overflow-y-auto no-scrollbar font-mono max-w-3xl mx-auto">
            <div class="border border-green-500/30 rounded-xl p-4 bg-black cyber-glow">
                <h2 class="text-green-400 font-bold mb-3 text-sm">> RIFQY_CYBER_TOOLS</h2>
                <select id="cyberMode" onchange="togglePwd()" class="w-full bg-slate-900 border border-green-500/50 text-green-400 p-2 rounded mb-3 outline-none text-xs">
                    <option value="hex">Text <-> Hex</option>
                    <option value="base64">Text <-> Base64</option>
                    <option value="stegano">Steganography (AES-256)</option>
                </select>
                <textarea id="cyberInput" class="w-full bg-slate-900 border border-green-500/20 text-green-300 p-2 rounded h-[100px] outline-none text-xs" placeholder="Input Data..."></textarea>
                <input type="password" id="cyberPassword" class="hidden w-full bg-slate-900 border border-red-500/50 text-red-400 p-2 rounded mt-2 outline-none text-xs" placeholder="Password AES...">
                <div class="flex gap-2 mt-3">
                    <button onclick="runCyber('encode')" class="flex-1 bg-green-900/50 text-green-300 py-2 border border-green-500/50 rounded text-xs">ENCODE</button>
                    <button onclick="runCyber('decode')" class="flex-1 bg-red-900/50 text-red-300 py-2 border border-red-500/50 rounded text-xs">DECODE</button>
                </div>
                <textarea id="cyberOutput" readonly class="w-full bg-black border border-green-500/20 text-green-400 p-2 rounded h-[100px] mt-3 outline-none break-all text-xs" placeholder="Output..."></textarea>
            </div>
        </section>

        <section id="tab-media" class="hidden w-full h-full p-4 flex flex-col max-w-3xl mx-auto space-y-4">
            <div class="bg-slate-800/50 border-2 border-dashed border-slate-600 rounded-2xl p-6 text-center">
                <h3 class="text-indigo-300 font-bold mb-4">PDF & Image Scanner</h3>
                <input type="file" id="mediaInput" accept="image/*, .pdf" class="block w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:bg-indigo-900 file:text-indigo-300 mb-4 cursor-pointer">
                
                <select id="mediaAction" class="w-full bg-slate-900 text-xs p-3 rounded-xl outline-none border border-slate-700 text-white mb-4">
                    <option value="translate">🔄 Ekstrak ke Tab Terjemahan</option>
                    <option value="gemini">✨ Bedah & Ringkas dengan Gemini AI</option>
                </select>
                
                <button onclick="processMedia()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold text-sm">Mulai Scan</button>
                <div id="mediaStatus" class="hidden mt-3 text-xs text-indigo-400 animate-pulse"></div>
            </div>
        </section>

        <section id="tab-ai" class="hidden w-full h-full flex flex-col p-4 overflow-hidden max-w-3xl mx-auto">
            <div class="flex justify-between items-center bg-slate-900 p-2 rounded-xl border border-white/10 mb-2">
                <select id="aiTone" class="bg-transparent text-[10px] text-indigo-300 outline-none font-bold">
                    <option value="formal">👔 Formal</option>
                    <option value="santai" selected>😎 Gaul & Santai</option>
                    <option value="detail">💼 Profesional & Detail</option>
                </select>
                <button onclick="clearAIChat()" class="text-[10px] bg-red-900/30 text-red-400 px-2 py-1 rounded">🗑️ Bersihkan</button>
            </div>

            <div id="aiChatBox" class="flex-grow bg-slate-950 border border-white/5 rounded-2xl p-4 overflow-y-auto no-scrollbar space-y-4 text-sm mb-2 shadow-inner"></div>

            <div class="flex gap-2 bg-slate-800 p-2 rounded-xl border border-white/10">
                <input id="aiInput" type="text" class="flex-grow bg-transparent outline-none px-2 text-sm text-white" placeholder="Tanya Gemini...">
                <button onclick="askGemini()" class="p-2 bg-indigo-600 rounded-lg">🚀</button>
            </div>
        </section>
    </main>

    <nav class="h-[60px] bg-slate-950 border-t border-white/10 flex justify-around items-center z-50 shrink-0">
        <button onclick="goTab('text')" id="nav-text" class="text-blue-500 font-bold scale-110 flex flex-col items-center"><span class="text-lg">📝</span><span class="text-[9px]">TEKS</span></button>
        <button onclick="goTab('voice')" id="nav-voice" class="text-slate-500 flex flex-col items-center transition hover:text-red-400"><span class="text-lg">🎙️</span><span class="text-[9px]">VOICE</span></button>
        <button onclick="goTab('cyber')" id="nav-cyber" class="text-slate-500 flex flex-col items-center transition hover:text-green-400"><span class="text-lg">💻</span><span class="text-[9px]">CYBER</span></button>
        <button onclick="goTab('media')" id="nav-media" class="text-slate-500 flex flex-col items-center transition hover:text-pink-400"><span class="text-lg">📄</span><span class="text-[9px]">MEDIA</span></button>
        <button onclick="goTab('ai')" id="nav-ai" class="text-slate-500 flex flex-col items-center transition hover:text-indigo-400"><span class="text-lg">🤖</span><span class="text-[9px]">AI</span></button>
    </nav>

    <script src="rifqy-db.js"></script>
    <script src="script.js"></script>
    <script src="rifqy-voice.js"></script>
    <script src="rifqy-tools.js"></script>
    <script src="rifqy-ai-core.js"></script>
</body>
</html>
