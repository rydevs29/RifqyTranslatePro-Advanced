<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RifqyTranslatePro & AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans h-screen flex flex-col">

    <header class="p-4 bg-slate-900 border-b border-white/10 flex justify-between items-center shadow-md">
        <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-purple-400">RifqyTranslatePro</h1>
        
        <div class="flex space-x-2 text-sm">
            <button onclick="goTab('text')" class="px-3 py-1 bg-indigo-600 rounded-lg hover:bg-indigo-500 transition">Teks</button>
            <button onclick="goTab('media')" class="px-3 py-1 bg-indigo-600 rounded-lg hover:bg-indigo-500 transition">Media</button>
            <button onclick="goTab('ai')" class="px-3 py-1 bg-purple-600 rounded-lg hover:bg-purple-500 transition shadow-[0_0_10px_rgba(168,85,247,0.4)]">Gemini AI</button>
        </div>
    </header>

    <main class="flex-grow overflow-hidden relative">
        
        <section id="tab-text" class="w-full h-full p-4 flex flex-col max-w-3xl mx-auto overflow-y-auto no-scrollbar">
            
            <div class="bg-slate-900 border border-white/10 rounded-2xl p-4 mb-4 shadow-lg">
                <div class="flex flex-col md:flex-row gap-4 items-center">
                    <div class="w-full">
                        <input type="text" id="searchSrc" onkeyup="filterLang('searchSrc', 'sourceLang')" placeholder="🔍 Cari bahasa asal..." class="w-full bg-slate-800 text-xs text-white px-3 py-2 rounded-t-lg outline-none border-b border-slate-700 placeholder-slate-500">
                        <select id="sourceLang" class="w-full bg-slate-800 text-sm p-2 rounded-b-lg outline-none cursor-pointer">
                            <option value="id">Indonesian</option>
                            <option value="en">English</option>
                            <option value="ja">Japanese</option>
                        </select>
                    </div>
                    
                    <button onclick="tukarBahasa()" class="p-2 bg-slate-800 rounded-full hover:bg-slate-700 transition">
                        <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                    </button>
                    
                    <div class="w-full">
                        <input type="text" id="searchTgt" onkeyup="filterLang('searchTgt', 'targetLang')" placeholder="🔍 Cari bahasa tujuan..." class="w-full bg-slate-800 text-xs text-white px-3 py-2 rounded-t-lg outline-none border-b border-slate-700 placeholder-slate-500">
                        <select id="targetLang" class="w-full bg-slate-800 text-sm p-2 rounded-b-lg outline-none cursor-pointer">
                            <option value="en">English</option>
                            <option value="id">Indonesian</option>
                            <option value="ja">Japanese</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="flex-grow flex flex-col gap-4">
                <textarea id="inputText" class="w-full h-1/2 bg-slate-900 border border-white/10 rounded-2xl p-4 resize-none outline-none focus:border-indigo-500 transition" placeholder="Ketik teks di sini..."></textarea>
                <textarea id="outputText" readonly class="w-full h-1/2 bg-slate-800/50 border border-white/5 rounded-2xl p-4 resize-none outline-none text-indigo-100" placeholder="Hasil terjemahan..."></textarea>
            </div>
        </section>

        <section id="tab-media" class="hidden w-full h-full p-4 flex flex-col justify-center items-center max-w-md mx-auto">
            <div class="bg-slate-900 w-full p-6 rounded-3xl border border-white/10 shadow-2xl text-center">
                <h2 class="text-lg font-bold mb-4 text-indigo-300">Scanner Cerdas</h2>
                
                <input type="file" id="mediaInput" accept="image/*, .pdf" class="block w-full text-sm text-slate-400 file:mr-4 file:py-3 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-indigo-900/40 file:text-indigo-300 hover:file:bg-indigo-900/60 transition mb-6 cursor-pointer">
                
                <div class="text-left mb-6">
                    <label class="block text-xs text-slate-400 mb-2 ml-1">Pilih Tindakan:</label>
                    <select id="mediaAction" class="w-full bg-slate-800 text-sm p-3 rounded-xl outline-none border border-slate-700 focus:border-indigo-500 transition cursor-pointer">
                        <option value="translate">🔄 Ekstrak & Taruh di Tab Teks</option>
                        <option value="gemini">✨ Minta AI Rapikan & Ringkas</option>
                    </select>
                </div>
                
                <button onclick="processMedia()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition shadow-[0_0_15px_rgba(79,70,229,0.3)]">Proses File</button>
                <div id="mediaStatus" class="hidden mt-4 text-xs font-medium text-indigo-400 animate-pulse bg-indigo-900/20 py-2 rounded-lg"></div>
            </div>
        </section>

        <section id="tab-ai" class="hidden w-full h-full flex flex-col p-4 max-w-3xl mx-auto overflow-hidden">
            <div class="flex justify-between items-center bg-slate-900 p-3 rounded-2xl border border-white/10 mb-3 shadow-md">
                <select id="aiTone" class="bg-slate-800 text-xs text-indigo-300 px-3 py-1.5 rounded-lg outline-none border border-slate-700 cursor-pointer">
                    <option value="Formal dan Sopan">👔 Formal</option>
                    <option value="Santai, Gaul, dan Asik" selected>😎 Santai / Gaul</option>
                    <option value="Profesional, Akurat, dan Detail">💼 Profesional</option>
                </select>
                <button onclick="clearAIChat()" class="text-xs text-red-400 hover:text-red-300 bg-red-900/20 hover:bg-red-900/40 px-3 py-1.5 rounded-lg transition font-medium border border-red-900/50">
                    🗑️ Hapus Chat
                </button>
            </div>

            <div id="aiChatBox" class="flex-grow bg-slate-950/50 border border-white/5 rounded-2xl p-4 overflow-y-auto no-scrollbar space-y-5 text-sm mb-3">
                </div>

            <div class="flex gap-2 bg-slate-900 p-2 rounded-2xl border border-white/10 shadow-xl">
                <input id="aiInput" type="text" class="flex-grow bg-transparent outline-none px-4 text-sm text-white placeholder-slate-500" placeholder="Tanya Gemini sesuatu...">
                <button onclick="askGemini()" class="p-3 bg-purple-600 hover:bg-purple-500 rounded-xl transition shadow-[0_0_10px_rgba(168,85,247,0.4)]">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
    <script src="rifqy-media.js"></script>
    <script src="rifqy-ai-core.js"></script>
</body>
</html>
